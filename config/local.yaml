# mcp-fs - local configuration (SQLite metadata + MinIO blobs, JWT identity).
# Selected via MCP_FS_CONFIG_NAME=local, or passed with --config.
#
# Identity is a verified RS256 bearer token only (no trust header). The end-user
# token rides X-Forwarded-Authorization (the standard Authorization header is
# reserved for a gateway's own auth). mcp-fs verifies the signature with the
# public key and reads the email claim. The token is minted upstream by web-a2a
# (it holds the matching private key); see scripts/gen-jwt-demo-keys.sh.

server:
  host: "0.0.0.0"
  port: 8080
  mcp_path: "/mcp"

auth:
  # Platform admins by identity (the JWT email claim). The owner of a project is
  # also matched by email. Add the people who may create projects here.
  admins: ["seb.morand@gmail.com", "sebastien.morand@ibm.com"]
  jwt:
    public_key_path: ".keys/jwt.pub"
    header: "X-Forwarded-Authorization"
    algorithms: ["RS256"]
    audience: null
    issuer: "web-a2a"
    username_claim: "email"

infra:
  meta:
    backend: "sqlite"
    dir: "state/volumes"
  blob:
    backend: "minio"
    endpoint: "http://127.0.0.1:9000"
    access_key: "admin"
    secret_key: "CHANGE_ME_MINIO_SECRET"
    bucket_prefix: "mcpfs-"
    region: "us-east-1"
  admin:
    backend: "sqlite"
    path: "state/admin.db"

safety:
  write_quota_bytes: 52428800
  trash_dir: ".mcp_trash"
  read_guard: true
  allow_hard_delete: false
  max_read_lines: 2000
