{% extends "base.html" %}
{% block title %}mcp-fs - sign in{% endblock %}
{% block body %}
<div class="login-wrap">
  <form class="login-card" method="post" action="/login">
    <h1 class="login-title">mcp-fs</h1>
    <p class="login-sub">Sign in with your email to browse your projects.</p>
    <label class="field-label" for="email">Email</label>
    <input class="field" id="email" name="email" type="email" placeholder="you@example.com" autofocus required>
    <button class="btn btn-primary login-btn" type="submit">Continue</button>
    <p class="login-hint">Declarative login (no password). You only see projects you own or are a member of.</p>
  </form>
</div>
{% endblock %}
