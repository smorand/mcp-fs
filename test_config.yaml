# Local full-stack test config (gitignored). Used by ./test-local.sh (kitty).
# S3 = moto (verified: moto 5.2.2, moto_server responds). LLM = IBM ICA nextgen.

s3:
  endpoint: "http://127.0.0.1:5055"   # moto server (5000 is macOS AirPlay/ControlCenter)
  access_key: "testing"               # moto ignores credentials
  secret_key: "testing"
  start_moto: true

llm:
  # IBM Consulting Assistants (nextgen), OpenAI-compatible. Verified working pair:
  # IBM_ICA_BASE_URL = https://api.nextgen-beta.ica.ibm.com/ica/v1 ; IBM_ICA_MODEL_KEY.
  # Referenced as env vars so the key is never written to disk (bash expands them
  # in the kitty tabs). If a tab does not inherit them, replace with literals.
  base_url: "$IBM_ICA_BASE_URL"
  api_key: "$IBM_ICA_MODEL_KEY"
  model: "claude-haiku-4-5"           # the available Haiku on this endpoint

paths:
  config_a2a: "/Users/sebastien/projects/perso/config-a2a"
  web_a2a: "/Users/sebastien/projects/perso/web-a2a"

admin_email: "seb.morand@gmail.com"
mount_id: "perso-seb"
