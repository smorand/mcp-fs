# config-a2a server wired to an mcp-fs filesystem server.
#
# mcp-fs speaks the same MCP fs.* surface and identity contract as mcp-juicefs,
# so config-a2a's native `juicefs:` block is a drop in: point its url at mcp-fs.
#
# Run mcp-fs first (cd ../mcp-fs && make run), then from the config-a2a repo:
#   MCP_FS_URL=http://localhost:5002/mcp \
#   MCP_FS_SERVICE_IDENTITY=sebastien \
#   MCP_FS_DEFAULT_MOUNT_ID=demo-ei \
#     uv run agent --config ../mcp-fs/config-examples/mcp-fs/agents.yaml --check
name: mcp-fs-server
version: 0.1.0
description: An agent with simulated filesystem tools served by mcp-fs (SQLite + MinIO).

server:
  host: 0.0.0.0
  port: 9010

# Server-wide identity: verify a signed RS256 bearer on X-Forwarded-Authorization
# (issuer web-a2a, email claim) and re-forward the same Bearer to mcp-fs on every
# fs.* call. A service token covers tool discovery. Paths resolve relative to this
# file; here they point at the shared demo keys (run scripts/gen-jwt-demo-keys.sh).
identity:
  public_key_path: ../../../config-a2a/.keys/jwt.pub
  header: X-Forwarded-Authorization
  algorithms: [RS256]
  issuer: web-a2a
  audience: null
  claim: email
  service_token_path: ../../../config-a2a/.keys/service.jwt

persistence:
  backend: sqlite
  url: sqlite+aiosqlite:///./state/mcp-fs-server.db
  run_migrations_on_start: true

observability:
  otel:
    enabled: true
    service_name: mcp-fs-server
    exporter: jsonl
    jsonl_path: traces/mcp-fs-server.jsonl

admin:
  enabled: true

agents:
  - slug: files
    name: mcp-fs-assistant
    description: Reads and writes files on the user's mcp-fs volumes.
    model:
      provider: openai-compatible
      model: openrouter/auto:free
      api_key_env: OPENROUTER_API_KEY
      base_url: https://openrouter.ai/api/v1
      extra_headers:
        HTTP-Referer: https://github.com/smorand/config-a2a
        X-Title: config-a2a mcp-fs-assistant
    pattern:
      type: react
      max_iterations: 8
    prompts:
      system_file: prompts/system.md
    # The juicefs: block desugars into a streamable-http MCP server with per
    # request identity forwarding (the server-wide jwt identity above governs it).
    # Pointed at mcp-fs, it gives the agent the fs.* tools, surfaced as
    # `fs.fs.read`, `fs.admin.create_project`, ...
    juicefs:
      url: ${MCP_FS_URL}                  # e.g. http://localhost:5002/mcp
      name: fs
      default_mount_id: ${MCP_FS_DEFAULT_MOUNT_ID}   # optional "current project"
    confirmations:
      destructive_hint: prompt
      per_tool:
        fs.fs.delete: prompt
        fs.fs.move: prompt
    guardrails:
      max_loops: 12
      max_tokens: 16000
      timeout_seconds: 180
    skills:
      - id: files
        name: mcp-fs files
        description: List, read, and (with confirmation) modify files on an mcp-fs volume.
        tags: [filesystem, mcp-fs]
        examples:
          - "List my volumes"
          - "Read /notes/hello.md from my demo-ei project"
